# APPLICATION & SERVER CONFIGURATION
spring.application.name=web-api-product
server.port=8080

# Error Handling Configuration
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# DATA SOURCE & MYSQL DRIVER CONFIGURATION
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/dbwebapiproduct?\
  createDatabaseIfNotExist=true&\
  allowPublicKeyRetrieval=true&\
  useSSL=false&\
  serverTimezone=UTC&\
  useUnicode=true&\
  characterEncoding=UTF-8

spring.datasource.username=root
spring.datasource.password=

# HIKARI CONNECTION POOL PERFORMANCE TUNING
spring.datasource.hikari.pool-name=Laragon-HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# Critical MySQL Optimization Params for Hikari
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# JPA / HIBERNATE ORM SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Better performance profiling: log SQL parameter values in logs
logging.level.org.hibernate.orm.jdbc.bind=trace

# Prevent anti-patterns (Explicitly disabling Open-In-View saves RAM/DB Connections)
spring.jpa.open-in-view=false
